<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroSync | Research</title>

<link rel="stylesheet" href="css/research.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/research.css">
<link rel="stylesheet" href="css/common.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-brain"></i>

<h2>NeuroSync</h2>

</div>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i>
Dashboard
</li>

<li onclick="location.href='sessions.html'">
<i class="fa-solid fa-bed"></i>
Sleep Sessions
</li>

<li onclick="location.href='analytics.html'">
<i class="fa-solid fa-chart-line"></i>
Analytics
</li>

<li onclick="location.href='coaching.html'">
<i class="fa-solid fa-user-doctor"></i>
Coaching
</li>

<li class="active">
<i class="fa-solid fa-flask"></i>
Research
</li>

<li onclick="location.href='admin.html'">
<i class="fa-solid fa-user-shield"></i>
Admin
</li>

<li id="logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</li>

</ul>

</div>

<div class="main">

<h1>Biomedical Research Data</h1>

<div class="form-card">

<h2>Add Bio Reading</h2>

<form id="researchForm">

<input
type="number"
id="sessionId"
placeholder="Session ID"
required>

<input
type="number"
step="0.1"
id="heartRate"
placeholder="Heart Rate"
required>

<input
type="number"
step="0.1"
id="spo2"
placeholder="SpO₂"
required>

<input
type="number"
step="0.1"
id="respirationRate"
placeholder="Respiration Rate"
required>

<input
type="number"
step="0.1"
id="bodyTemperature"
placeholder="Body Temperature"
required>

<button type="submit">

<i class="fa-solid fa-plus"></i>

Save Reading

</button>

</form>

</div>

<div class="table-card">

<h2>Biomedical Readings</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Session</th>

<th>Heart Rate</th>

<th>SpO₂</th>

<th>Respiration</th>

<th>Temperature</th>

<th>Recorded At</th>

</tr>

</thead>

<tbody id="researchTable">

</tbody>

</table>

</div>

</div>
<script src="js/common.js"></script>
<script src="js/research.js"></script>

</body>

</html>
