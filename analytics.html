<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NeuroSync | Analytics</title>

    <link rel="stylesheet" href="css/analytics.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/analytics.css">
<link rel="stylesheet" href="css/common.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-brain"></i>

        <h2>NeuroSync</h2>

    </div>

    <ul>

        <li onclick="location.href='dashboard.html'">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </li>

        <li onclick="location.href='sessions.html'">
            <i class="fa-solid fa-bed"></i>
            Sleep Sessions
        </li>

        <li class="active">
            <i class="fa-solid fa-chart-line"></i>
            Analytics
        </li>

        <li onclick="location.href='coaching.html'">
            <i class="fa-solid fa-user-doctor"></i>
            Coaching
        </li>

        <li onclick="location.href='research.html'">
            <i class="fa-solid fa-flask"></i>
            Research
        </li>

        <li onclick="location.href='admin.html'">
            <i class="fa-solid fa-user-shield"></i>
            Admin
        </li>

        <li id="logout">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </li>

    </ul>

</div>

<div class="main">

    <h1>Neuro Analytics</h1>

    <div class="cards">

        <div class="card">

            <i class="fa-solid fa-chart-column"></i>

            <h2 id="totalScores">0</h2>

            <p>Total Neuro Scores</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-brain"></i>

            <h2 id="averageScore">0</h2>

            <p>Average Score</p>

        </div>

        <div class="card">

            <i class="fa-solid fa-triangle-exclamation"></i>

            <h2 id="anomalyCount">0</h2>

            <p>Anomalies Detected</p>

        </div>

    </div>

    <div class="table-card">

        <h2>Analytics Records</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Session</th>

                <th>Score</th>

                <th>Sleep Quality</th>

                <th>Anomaly</th>

                <th>Generated At</th>

            </tr>

            </thead>

            <tbody id="analyticsTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/common.js"></script>
<script src="js/analytics.js"></script>

</body>

</html>
