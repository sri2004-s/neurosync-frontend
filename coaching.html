<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroSync | Coaching</title>

<link rel="stylesheet" href="css/coaching.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<link rel="stylesheet" href="css/coaching.css">
<link rel="stylesheet" href="css/common.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-brain"></i>

<h2>NeuroSync</h2>

</div>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i>
Dashboard
</li>

<li onclick="location.href='sessions.html'">
<i class="fa-solid fa-bed"></i>
Sleep Sessions
</li>

<li onclick="location.href='analytics.html'">
<i class="fa-solid fa-chart-line"></i>
Analytics
</li>

<li class="active">
<i class="fa-solid fa-user-doctor"></i>
Coaching
</li>

<li onclick="location.href='research.html'">
<i class="fa-solid fa-flask"></i>
Research
</li>

<li onclick="location.href='admin.html'">
<i class="fa-solid fa-user-shield"></i>
Admin
</li>

<li id="logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</li>

</ul>

</div>

<div class="main">

<h1>Neuro Coaching Plans</h1>

<div class="form-card">

<h2>Create Intervention Plan</h2>

<form id="planForm">

<input
type="number"
id="patientId"
placeholder="Patient ID"
required>

<input
type="number"
id="coachId"
placeholder="Coach ID"
required>

<select id="status">

<option value="PENDING">PENDING</option>

<option value="ACCEPTED">ACCEPTED</option>

<option value="REJECTED">REJECTED</option>

</select>

<textarea
id="description"
placeholder="Intervention Description"
rows="5"
required></textarea>

<button type="submit">

<i class="fa-solid fa-plus"></i>

Create Plan

</button>

</form>

</div>

<div class="table-card">

<h2>Intervention Plans</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Patient</th>

<th>Coach</th>

<th>Status</th>

<th>Description</th>

<th>Created</th>

</tr>

</thead>

<tbody id="planTable">

</tbody>

</table>

</div>

</div>

<script src="js/common.js"></script>
<script src="js/coaching.js"></script>

</body>

</html>
