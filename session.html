<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NeuroSync | Sleep Sessions</title>

    <link rel="stylesheet"
          href="css/sessions.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/session.css">
    <link rel="stylesheet" href="css/common.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-brain"></i>

        <h2>NeuroSync</h2>

    </div>

    <ul>

        <li onclick="location.href='dashboard.html'">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </li>

        <li class="active">

            <i class="fa-solid fa-bed"></i>

            Sleep Sessions

        </li>

        <li onclick="location.href='analytics.html'">

            <i class="fa-solid fa-chart-line"></i>

            Analytics

        </li>

        <li onclick="location.href='coaching.html'">

            <i class="fa-solid fa-user-doctor"></i>

            Coaching

        </li>

        <li onclick="location.href='research.html'">

            <i class="fa-solid fa-flask"></i>

            Research

        </li>

        <li onclick="location.href='admin.html'">

            <i class="fa-solid fa-user-shield"></i>

            Admin

        </li>

        <li id="logout">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </li>

    </ul>

</div>

<div class="main">

    <h1>Sleep Sessions</h1>

    <div class="form-card">

        <h2>Create New Session</h2>

        <form id="sessionForm">

            <input
                    type="datetime-local"
                    id="startTime"
                    required>

            <input
                    type="datetime-local"
                    id="endTime"
                    required>

            <!-- UPDATED STATUS FIELD -->

            <select
                    id="status"
                    required>

                <option value="">
                    Select Session Status
                </option>

                <option value="RECORDING">
                    RECORDING
                </option>

                <option value="PROCESSING">
                    PROCESSING
                </option>

                <option value="ANALYZED">
                    ANALYZED
                </option>

                <option value="ABORTED">
                    ABORTED
                </option>

            </select>

            <input
                    type="number"
                    id="patientId"
                    placeholder="Patient ID"
                    required>

            <button type="submit">

                <i class="fa-solid fa-plus"></i>

                Create Session

            </button>

        </form>

    </div>

    <div class="table-card">

        <h2>All Sleep Sessions</h2>

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Patient</th>

                <th>Status</th>

                <th>Start</th>

                <th>End</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="sessionTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/common.js"></script>
<script src="js/session.js"></script>

</body>

</html>
